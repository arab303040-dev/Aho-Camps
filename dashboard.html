<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - Aho Camps</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f5f6fa; }
    .navbar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar h1 { font-size: 24px; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid white;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
    }
    .logout-btn:hover { background: white; color: #667eea; }
    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .stat-card h3 {
      color: #888;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .stat-card .number {
      font-size: 36px;
      font-weight: 700;
      color: #667eea;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .action-btn {
      background: white;
      border: 2px solid #667eea;
      color: #667eea;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .action-btn:hover {
      background: #667eea;
      color: white;
    }
    .section {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .section h2 {
      margin-bottom: 20px;
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #f8f9fa;
      font-weight: 600;
      color: #667eea;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

  <nav class="navbar">
    <h1>🏕️ Aho Camps - لوحة التحكم</h1>
    <div class="user-info">
      <span id="userEmail">جاري التحميل...</span>
      <button class="logout-btn" onclick="logoutUser()">تسجيل الخروج</button>
    </div>
  </nav>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <h3>إجمالي العمال</h3>
        <div class="number" id="totalWorkers">0</div>
      </div>
      <div class="stat-card">
        <h3>عدد السكنات</h3>
        <div class="number" id="totalCamps">0</div>
      </div>
      <div class="stat-card">
        <h3>نسبة الإشغال</h3>
        <div class="number" id="occupancyRate">0%</div>
      </div>
    </div>

    <div class="actions">
      <a href="workers.html" class="action-btn">
        <div style="font-size:30px">👷</div>
        <div>إدارة العمال</div>
      </a>
      <a href="camps.html" class="action-btn">
        <div style="font-size:30px">🏠</div>
        <div>إدارة السكنات</div>
      </a>
    </div>

    <div class="section">
      <h2>👷 آخر العمال المضافين</h2>
      <table>
        <thead>
          <tr>
            <th>الاسم</th>
            <th>الجنسية</th>
            <th>السكن</th>
            <th>الحالة</th>
          </tr>
        </thead>
        <tbody id="recentWorkers">
          <tr><td colspan="4" style="text-align:center">جاري التحميل...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/database.js"></script>
  
  <script>
    async function loadDashboardStats() {
      try {
        const workers = await getAllWorkers();
        document.getElementById('totalWorkers').textContent = workers.length;
        
        const campsSnapshot = await db.collection("camps").where("status", "==", "active").get();
        const campsCount = campsSnapshot.size;
        document.getElementById('totalCamps').textContent = campsCount;
        
        let totalCapacity = 0;
        let totalOccupancy = 0;
        campsSnapshot.forEach(doc => {
          const camp = doc.data();
          totalCapacity += camp.capacity || 0;
          totalOccupancy += camp.currentOccupancy || 0;
        });
        
        const rate = totalCapacity > 0 ? Math.round((totalOccupancy / totalCapacity) * 100) : 0;
        document.getElementById('occupancyRate').textContent = rate + '%';
        
        const recentWorkers = workers.slice(0, 5);
        const tbody = document.getElementById('recentWorkers');
        
        if (recentWorkers.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">لا يوجد عمال مسجلين</td></tr>';
        } else {
          tbody.innerHTML = recentWorkers.map(worker => `
            <tr>
              <td>${worker.name}</td>
              <td>${worker.nationality}</td>
              <td>${worker.campId || 'غير محدد'}</td>
              <td><span style="color: ${worker.status === 'active' ? 'green' : 'red'}">${worker.status === 'active' ? '✅ نشط' : '❌ غير نشط'}</span></td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error("خطأ:", error);
      }
    }

    window.addEventListener('load', loadDashboardStats);
  </script>

</body>
</html>
