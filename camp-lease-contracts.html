<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>نظام إدارة العقود | Aho Camps</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-body: #fefcf5;
      --bg-surface: #ffffff;
      --bg-card: #ffffff;
      --bg-side: #f9f7f0;
      --border-light: #e9e5da;
      --border-med: #ddd6c8;
      --text-primary: #2c2a24;
      --text-secondary: #6b6256;
      --text-muted: #9b927e;
      --accent: #c27e3a;
      --accent-light: #e5d5bd;
      --accent-bg: rgba(194, 126, 58, 0.08);
      --green: #2b7a3e;
      --green-bg: rgba(43, 122, 62, 0.1);
      --amber: #b45f1b;
      --amber-bg: rgba(180, 95, 27, 0.1);
      --red: #bc4a2c;
      --red-bg: rgba(188, 74, 44, 0.08);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.02);
    }

    body {
      background: var(--bg-body);
      color: var(--text-primary);
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      line-height: 1.45;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-body);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .app {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 16px 24px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0 20px;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 20px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .brand h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .brand p {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      background: var(--bg-side);
      border-radius: 40px;
      border: 1px solid var(--border-light);
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    .user-details {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .user-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .user-email {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.8rem;
      border: 1px solid var(--border-med);
      background: white;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn:hover {
      background: var(--bg-side);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #b0692c;
    }

    .btn-danger {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    .btn-danger:hover {
      background: #a33d25;
    }

    /* Stats */
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      padding: 12px 20px;
      flex: 1 1 160px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }

    /* Tabs */
    .nav-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 6px;
    }

    .nav-tab {
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
    }

    .nav-tab.active {
      background: var(--bg-surface);
      color: var(--accent);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }

    .badge {
      background: var(--accent-bg);
      padding: 2px 8px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      background: var(--bg-surface);
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-body);
      padding: 6px 12px;
      border-radius: 40px;
      border: 1px solid var(--border-med);
      flex: 1 1 220px;
    }

    .search-box input {
      background: none;
      border: none;
      outline: none;
      flex: 1;
      font-size: 0.8rem;
      font-family: inherit;
    }

    select {
      background: var(--bg-body);
      border: 1px solid var(--border-med);
      padding: 7px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
    }

    /* Table */
    .table-wrapper {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      overflow-x: auto;
      box-shadow: var(--shadow-sm);
    }

    .contract-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      min-width: 1000px;
    }

    .contract-table th {
      text-align: right;
      padding: 14px 10px;
      background: var(--bg-side);
      color: var(--text-secondary);
      font-weight: 600;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      white-space: nowrap;
    }

    .contract-table td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
      text-align: right;
    }

    .contract-table tbody tr:hover {
      background: var(--accent-bg);
    }

    .badge-status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .badge-green {
      background: var(--green-bg);
      color: var(--green);
    }

    .badge-amber {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .badge-red {
      background: var(--red-bg);
      color: var(--red);
    }

    .row-actions {
      display: flex;
      gap: 6px;
      opacity: 0.5;
      transition: opacity 0.15s;
    }

    tr:hover .row-actions {
      opacity: 1;
    }

    .action-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--text-secondary);
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .action-icon:hover {
      background: var(--border-light);
      color: var(--accent);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg-surface);
      width: 90%;
      max-width: 780px;
      max-height: 85vh;
      border-radius: 28px;
      box-shadow: var(--shadow-md);
      overflow-y: auto;
      border: 1px solid var(--border-light);
    }

    .modal-header {
      padding: 22px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 20px 22px;
    }

    .full-width {
      grid-column: span 2;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--bg-body);
      border: 1px solid var(--border-med);
      border-radius: 14px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.8rem;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(194, 126, 58, 0.2);
    }

    .modal-footer {
      padding: 16px 22px;
      border-top: 1px solid var(--border-light);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: white;
      border-right: 5px solid var(--green);
      padding: 12px 18px;
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.05);
      font-size: 0.8rem;
      font-weight: 500;
      animation: slideIn 0.3s ease;
    }

    .toast.error {
      border-right-color: var(--red);
    }

    .toast.warning {
      border-right-color: var(--amber);
    }

    @keyframes slideIn {
      from {
        transform: translateX(-100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>جاري التحقق من الجلسة...</p>
  </div>

  <div class="app" id="app" style="display: none;">
    <!-- Header -->
    <div class="header">
      <div class="logo-area">
        <div class="logo-icon">📋</div>
        <div class="brand">
          <h1>نظام إدارة العقود</h1>
          <p>Contract Management System</p>
        </div>
      </div>

      <div class="header-actions">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-details">
            <div class="user-name" id="userName">جاري التحميل...</div>
            <div class="user-email" id="userEmail">Loading...</div>
          </div>
        </div>
        <button class="btn btn-danger" onclick="logoutUser()">🚪 خروج</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Tabs -->
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('all', this)">📋 جميع العقود</button>
      <button class="nav-tab" onclick="switchTab('active', this)">✅ نشطة</button>
      <button class="nav-tab" onclick="switchTab('expiring', this)">⚠️ قريبة الانتهاء</button>
      <button class="nav-tab" onclick="switchTab('expired', this)">❌ منتهية</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 بحث..." oninput="filterContracts()">
      </div>
      <select id="cityFilter" onchange="filterContracts()">
        <option value="">كل المدن</option>
      </select>
      <select id="paymentFilter" onchange="filterContracts()">
        <option value="">دورة الدفع</option>
        <option value="شهري">شهري</option>
        <option value="ربع سنوي">ربع سنوي</option>
        <option value="سنوي">سنوي</option>
      </select>
      <button class="btn btn-primary" onclick="openModal()">➕ إضافة عقد</button>
      <button class="btn" onclick="exportExcel()">📊 تصدير Excel</button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table class="contract-table">
        <thead>
          <tr>
            <th>المدينة</th>
            <th>المخيم</th>
            <th>المالك</th>
            <th>رقم العقد</th>
            <th>الإيجار السنوي</th>
            <th>دورة الدفع</th>
            <th>تاريخ البداية</th>
            <th>تاريخ النهاية</th>
            <th>الحالة</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="contractsTable">
          <tr>
            <td colspan="10" class="empty-state">
              <div class="empty-icon">📋</div>
              <p>جاري التحميل...</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">➕ إضافة عقد جديد</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>المدينة *</label>
          <input id="city" placeholder="الرياض">
        </div>
        <div class="form-group">
          <label>المخيم</label>
          <input id="camp" placeholder="مخيم أ">
        </div>
        <div class="form-group">
          <label>رقم المشروع</label>
          <input id="projectId" placeholder="PRJ-001">
        </div>
        <div class="form-group">
          <label>المالك / المؤجر *</label>
          <input id="owner" placeholder="محمد أحمد">
        </div>
        <div class="form-group">
          <label>الطابق</label>
          <input id="floor" placeholder="2">
        </div>
        <div class="form-group">
          <label>رقم الشقة</label>
          <input id="flat" placeholder="201">
        </div>
        <div class="form-group">
          <label>عدد الغرف</label>
          <input id="rooms" type="number" placeholder="3" min="0">
        </div>
        <div class="form-group">
          <label>عدد السكان</label>
          <input id="residents" type="number" placeholder="4" min="0">
        </div>
        <div class="form-group">
          <label>الإيجار السنوي (ريال) *</label>
          <input id="annualRent" type="number" placeholder="60000" min="0">
        </div>
        <div class="form-group">
          <label>دورة الدفع</label>
          <select id="paymentCycle">
            <option>شهري</option>
            <option>ربع سنوي</option>
            <option>سنوي</option>
          </select>
        </div>
        <div class="form-group">
          <label>تاريخ البداية *</label>
          <input id="startDate" type="date">
        </div>
        <div class="form-group">
          <label>تاريخ النهاية *</label>
          <input id="endDate" type="date">
        </div>
        <div class="form-group">
          <label>رقم العقد</label>
          <input id="contractNo" placeholder="CNT-2025-001">
        </div>
        <div class="form-group">
          <label>رابط العقد</label>
          <input id="contractLink" placeholder="https://...">
        </div>
        <div class="form-group full-width">
          <label>ملاحظات</label>
          <textarea id="notes" placeholder="أي ملاحظات إضافية..."></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveContract()">💾 حفظ</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/firebase-config.js"></script>

  <script>
    // ============================================
    // STATE MANAGEMENT
    // ============================================
    let currentUser = null;
    let contracts = [];
    let currentTab = 'all';
    let editingId = null;

    // ============================================
    // FIREBASE AUTH CHECK
    // ============================================
    firebase.auth().onAuthStateChanged((user) => {
      const loadingOverlay = document.getElementById('loadingOverlay');
      const app = document.getElementById('app');

      if (user) {
        currentUser = user;
        loadingOverlay.style.display = 'none';
        app.style.display = 'block';

        // Update user info
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userName').textContent = user.displayName || 'المستخدم';
        document.getElementById('userAvatar').textContent = (user.displayName || user.email).charAt(0).toUpperCase();

        // Load data
        loadContracts();
        loadStats();
      } else {
        window.location.replace('login.html');
      }
    });

    // ============================================
    // LOGOUT
    // ============================================
    function logoutUser() {
      if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
        firebase.auth().signOut().then(() => {
          window.location.replace('login.html');
        });
      }
    }

    // ============================================
    // LOAD CONTRACTS FROM FIREBASE
    // ============================================
    async function loadContracts() {
      try {
        const snapshot = await firebase.firestore().collection('contracts').get();
        contracts = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));
        updateCityFilter();
        renderTable();
      } catch (error) {
        console.error('خطأ في تحميل العقود:', error);
        showToast('خطأ في تحميل البيانات', 'error');
      }
    }

    // ============================================
    // LOAD STATS
    // ============================================
    function loadStats() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const active = contracts.filter(c => {
        const endDate = c.endDate ? new Date(c.endDate) : null;
        return !endDate || endDate > today;
      }).length;

      const expiring = contracts.filter(c => {
        const endDate = c.endDate ? new Date(c.endDate) : null;
        if (!endDate) return false;
        const daysLeft = (endDate - today) / (1000 * 60 * 60 * 24);
        return daysLeft > 0 && daysLeft <= 30;
      }).length;

      const expired = contracts.filter(c => {
        const endDate = c.endDate ? new Date(c.endDate) : null;
        return endDate && endDate <= today;
      }).length;

      const totalRent = contracts.reduce((sum, c) => sum + (c.annualRent || 0), 0);

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">📋 إجمالي العقود</div>
          <div class="stat-value">${contracts.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">✅ عقود نشطة</div>
          <div class="stat-value" style="color: var(--green);">${active}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">⚠️ قريبة الانتهاء</div>
          <div class="stat-value" style="color: var(--amber);">${expiring}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">❌ منتهية</div>
          <div class="stat-value" style="color: var(--red);">${expired}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">💰 إجمالي الإيجار السنوي</div>
          <div class="stat-value" style="color: var(--accent);">${totalRent.toLocaleString()} ر.س</div>
        </div>
      `;
    }

    // ============================================
    // RENDER TABLE
    // ============================================
    function renderTable() {
      const tbody = document.getElementById('contractsTable');
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let filtered = contracts;

      // Filter by tab
      if (currentTab === 'active') {
        filtered = filtered.filter(c => {
          const endDate = c.endDate ? new Date(c.endDate) : null;
          return !endDate || endDate > today;
        });
      } else if (currentTab === 'expiring') {
        filtered = filtered.filter(c => {
          const endDate = c.endDate ? new Date(c.endDate) : null;
          if (!endDate) return false;
          const daysLeft = (endDate - today) / (1000 * 60 * 60 * 24);
          return daysLeft > 0 && daysLeft <= 30;
        });
      } else if (currentTab === 'expired') {
        filtered = filtered.filter(c => {
          const endDate = c.endDate ? new Date(c.endDate) : null;
          return endDate && endDate <= today;
        });
      }

      // Filter by search
      const searchText = document.getElementById('searchInput').value.toLowerCase();
      if (searchText) {
        filtered = filtered.filter(c =>
          (c.city || '').toLowerCase().includes(searchText) ||
          (c.camp || '').toLowerCase().includes(searchText) ||
          (c.owner || '').toLowerCase().includes(searchText) ||
          (c.contractNo || '').toLowerCase().includes(searchText)
        );
      }

      // Filter by city
      const cityFilter = document.getElementById('cityFilter').value;
      if (cityFilter) {
        filtered = filtered.filter(c => c.city === cityFilter);
      }

      // Filter by payment cycle
      const paymentFilter = document.getElementById('paymentFilter').value;
      if (paymentFilter) {
        filtered = filtered.filter(c => c.paymentCycle === paymentFilter);
      }

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="10" class="empty-state"><div class="empty-icon">📭</div><p>لا توجد عقود</p></td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(c => {
        const endDate = c.endDate ? new Date(c.endDate) : null;
        const daysLeft = endDate ? (endDate - today) / (1000 * 60 * 60 * 24) : null;

        let statusBadge = '<span class="badge-status badge-green">نشط</span>';
        if (endDate && endDate <= today) {
          statusBadge = '<span class="badge-status badge-red">منتهي</span>';
        } else if (daysLeft !== null && daysLeft > 0 && daysLeft <= 30) {
          statusBadge = '<span class="badge-status badge-amber">قريب الانتهاء</span>';
        }

        return `
          <tr>
            <td>${c.city || '-'}</td>
            <td>${c.camp || '-'}</td>
            <td>${c.owner || '-'}</td>
            <td>${c.contractNo || '-'}</td>
            <td>${(c.annualRent || 0).toLocaleString()} ر.س</td>
            <td>${c.paymentCycle || '-'}</td>
            <td>${c.startDate || '-'}</td>
            <td>${c.endDate || '-'}</td>
            <td>${statusBadge}</td>
            <td>
              <div class="row-actions">
                <button class="action-icon" onclick="editContract('${c.id}')" title="تعديل">✏️</button>
                <button class="action-icon" onclick="deleteContract('${c.id}')" title="حذف">🗑️</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    // ============================================
    // UTILITIES
    // ============================================
    function filterContracts() {
      renderTable();
    }

    function updateCityFilter() {
      const cities = [...new Set(contracts.map(c => c.city).filter(Boolean))];
      const select = document.getElementById('cityFilter');
      const currentValue = select.value;
      select.innerHTML = '<option value="">كل المدن</option>' + 
        cities.map(city => `<option value="${city}">${city}</option>`).join('');
      select.value = currentValue;
    }

    function switchTab(tab, element) {
      currentTab = tab;
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      element.classList.add('active');
      renderTable();
    }

    // ============================================
    // MODAL OPERATIONS
    // ============================================
    function openModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = '➕ إضافة عقد جديد';
      document.getElementById('city').value = '';
      document.getElementById('camp').value = '';
      document.getElementById('projectId').value = '';
      document.getElementById('owner').value = '';
      document.getElementById('floor').value = '';
      document.getElementById('flat').value = '';
      document.getElementById('rooms').value = '';
      document.getElementById('residents').value = '';
      document.getElementById('annualRent').value = '';
      document.getElementById('paymentCycle').value = 'شهري';
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      document.getElementById('contractNo').value = '';
      document.getElementById('contractLink').value = '';
      document.getElementById('notes').value = '';
      document.getElementById('addModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('addModal').classList.remove('open');
    }

    async function editContract(id) {
      const contract = contracts.find(c => c.id === id);
      if (!contract) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = '✏️ تعديل العقد';
      document.getElementById('city').value = contract.city || '';
      document.getElementById('camp').value = contract.camp || '';
      document.getElementById('projectId').value = contract.projectId || '';
      document.getElementById('owner').value = contract.owner || '';
      document.getElementById('floor').value = contract.floor || '';
      document.getElementById('flat').value = contract.flat || '';
      document.getElementById('rooms').value = contract.rooms || '';
      document.getElementById('residents').value = contract.residents || '';
      document.getElementById('annualRent').value = contract.annualRent || '';
      document.getElementById('paymentCycle').value = contract.paymentCycle || 'شهري';
      document.getElementById('startDate').value = contract.startDate || '';
      document.getElementById('endDate').value = contract.endDate || '';
      document.getElementById('contractNo').value = contract.contractNo || '';
      document.getElementById('contractLink').value = contract.contractLink || '';
      document.getElementById('notes').value = contract.notes || '';
      document.getElementById('addModal').classList.add('open');
    }

    async function saveContract() {
      const city = document.getElementById('city').value;
      const owner = document.getElementById('owner').value;
      const annualRent = document.getElementById('annualRent').value;
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      if (!city || !owner || !annualRent || !startDate || !endDate) {
        showToast('الرجاء ملء جميع الحقول المطلوبة', 'error');
        return;
      }

      const contractData = {
        city: city,
        camp: document.getElementById('camp').value,
        projectId: document.getElementById('projectId').value,
        owner: owner,
        floor: document.getElementById('floor').value,
        flat: document.getElementById('flat').value,
        rooms: parseInt(document.getElementById('rooms').value) || 0,
        residents: parseInt(document.getElementById('residents').value) || 0,
        annualRent: parseFloat(annualRent),
        paymentCycle: document.getElementById('paymentCycle').value,
        startDate: startDate,
        endDate: endDate,
        contractNo: document.getElementById('contractNo').value,
        contractLink: document.getElementById('contractLink').value,
        notes: document.getElementById('notes').value,
        updatedAt: new Date().toISOString()
      };

      try {
        if (editingId) {
          await firebase.firestore().collection('contracts').doc(editingId).update(contractData);
          showToast('تم تحديث العقد بنجاح', 'success');
        } else {
          await firebase.firestore().collection('contracts').add(contractData);
          showToast('تم إضافة العقد بنجاح', 'success');
        }
        closeModal();
        loadContracts();
        loadStats();
      } catch (error) {
        console.error('خطأ:', error);
        showToast('حدث خطأ أثناء حفظ العقد', 'error');
      }
    }

    async function deleteContract(id) {
      if (confirm('هل أنت متأكد من حذف هذا العقد؟')) {
        try {
          await firebase.firestore().collection('contracts').doc(id).delete();
          showToast('تم حذف العقد بنجاح', 'success');
          loadContracts();
          loadStats();
        } catch (error) {
          console.error('خطأ:', error);
          showToast('حدث خطأ أثناء حذف العقد', 'error');
        }
      }
    }

    // ============================================
    // EXPORT TO EXCEL
    // ============================================
    function exportExcel() {
      try {
        const data = contracts.map(c => ({
          'المدينة': c.city,
          'المخيم': c.camp,
          'رقم المشروع': c.projectId,
          'المالك': c.owner,
          'الطابق': c.floor,
          'الشقة': c.flat,
          'عدد الغرف': c.rooms,
          'عدد السكان': c.residents,
          'الإيجار السنوي': c.annualRent,
          'دورة الدفع': c.paymentCycle,
          'تاريخ البداية': c.startDate,
          'تاريخ النهاية': c.endDate,
          'رقم العقد': c.contractNo,
          'ملاحظات': c.notes
        }));

        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, 'العقود');
        XLSX.writeFile(workbook, `العقود_${new Date().toISOString().slice(0, 10)}.xlsx`);
        showToast('تم تصدير البيانات بنجاح', 'success');
      } catch (error) {
        console.error('خطأ:', error);
        showToast('حدث خطأ أثناء التصدير', 'error');
      }
    }

  // Window global functions
  window.openContractModal = openContractModal;
  window.inlineEdit = inlineEdit;

  // initial empty state (will load from Firebase)
  contracts = [];
  updateContractStatuses();
    // ============================================
    // TOAST NOTIFICATION
    // ============================================
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>

</html>
