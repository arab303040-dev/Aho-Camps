<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Aho Camps</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      direction:rtl;
    }

    .header{
      background:#0284c7;
      padding:20px;
      text-align:center;
      font-size:32px;
      font-weight:bold;
    }

    .hero{
      padding:80px 20px;
      text-align:center;
    }

    .hero h1{
      font-size:55px;
      margin-bottom:20px;
      color:#38bdf8;
    }

    .hero p{
      font-size:22px;
      color:#cbd5e1;
      margin-bottom:30px;
    }

    .btn{
      background:#38bdf8;
      color:white;
      padding:15px 35px;
      border:none;
      border-radius:10px;
      font-size:20px;
      cursor:pointer;
    }

    .btn:hover{
      background:#0ea5e9;
    }

  </style>
</head>

<body>

  <div class="header">
    Aho Camps
  </div>

  <div class="hero">

    <h1>
      نظام إدارة العمال والسكنات
    </h1>

    <p>
      منصة احترافية 
    </p>

    <button class="btn">
      دخول النظام
    </button>

  </div>

</body>
</html>
